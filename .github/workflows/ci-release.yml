name: Release (deno compile)

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with: { deno-version: v1.x }
      - name: Build CLI
        run: |
          deno task build:cli
          ls -la dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: res-${{ matrix.os }}
          path: dist/**
