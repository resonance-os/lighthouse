name: CI (matrix: OS × SSOT × Agent; with Clock)

on:
  workflow_dispatch:
    inputs:
      agent_worker:
        description: "Run agent worker"
        type: boolean
        default: true
  schedule:
    # UTC。平日深夜に走らせる例
    - cron: "0 18 * * 1-5"

concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix-run:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        ssot: [ ndjson, kv, sqlite ]
        agent_worker: [ false, true ]
    runs-on: ${{ matrix.os }}
    env:
      INGRESS_PORT: 8787
      AGENT_PORT: 8790
      SSOT_DRIVER: ${{ matrix.ssot }}
      RNG_SEED: 42
      OPENAI_API_KEY: ""
      DENO_DIR: ~/.deno

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with: { deno-version: v1.x }

      # jq/curl install (OSごと)
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq curl
      - if: runner.os == 'macOS'
        run: brew update && (brew install jq curl || true)
      - if: runner.os == 'Windows'
        shell: pwsh
        run: choco install jq -y

      - name: Show matrix
        run: |
          echo "OS=${{ matrix.os }}"
          echo "SSOT_DRIVER=${SSOT_DRIVER}"
          echo "agent_worker=${{ matrix.agent_worker }}"

      # ingress 起動（OS分岐）
      - name: Start ingress (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          nohup deno task dev:ingress > logs/api.log 2>&1 &
          echo $! > logs/api.pid
          for i in `seq 1 60`; do curl -sf "http://127.0.0.1:${INGRESS_PORT}/healthz" && break || sleep 0.5; done
      - name: Start ingress (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process deno -ArgumentList 'task','dev:ingress' -RedirectStandardOutput 'logs\api.log' -RedirectStandardError 'logs\api.log' -PassThru
          $p.Id | Out-File 'logs\api.pid'
          $deadline = (Get-Date).AddSeconds(30); $ok=$false
          do { try { curl.exe -sf "http://127.0.0.1:$env:INGRESS_PORT/healthz" | Out-Null; $ok=$true } catch { Start-Sleep -Milliseconds 500 } } until ($ok -or (Get-Date) -gt $deadline)
          if (-not $ok) { throw "Ingress not up" }

      # clock（seed固定）起動
      - name: Start clock (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          nohup env RNG_SEED=${RNG_SEED} deno task dev:clock > logs/hana.log 2>&1 &
          echo $! > logs/hana.pid
      - name: Start clock (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:RNG_SEED='42'
          $p = Start-Process deno -ArgumentList 'task','dev:clock' -RedirectStandardOutput 'logs\hana.log' -RedirectStandardError 'logs\hana.log' -PassThru
          $p.Id | Out-File 'logs\hana.pid'

      # agent サーバ/ワーカー（任意）
      - name: Start agent server (Linux/macOS)
        if: matrix.agent_worker == 'true' && runner.os != 'Windows'
        run: |
          nohup deno task dev:agent > logs/emmy.log 2>&1 &
          echo $! > logs/emmy.pid
      - name: Start agent server (Windows)
        if: matrix.agent_worker == 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process deno -ArgumentList 'task','dev:agent' -RedirectStandardOutput 'logs\emmy.log' -RedirectStandardError 'logs\emmy.log' -PassThru
          Add-Content 'logs\emmy.pid' $p.Id
      - name: Start agent worker (Linux/macOS)
        if: matrix.agent_worker == 'true' && runner.os != 'Windows'
        run: |
          nohup deno task dev:agent:worker >> logs/emmy.log 2>&1 &
          echo $! >> logs/emmy.pid
      - name: Start agent worker (Windows)
        if: matrix.agent_worker == 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process deno -ArgumentList 'task','dev:agent:worker' -RedirectStandardOutput 'logs\emmy.log' -RedirectStandardError 'logs\emmy.log' -PassThru
          Add-Content 'logs\emmy.pid' $p.Id

      # シード + 任意で /chat 実行
      - name: Seed observations
        run: |
          curl -s -X POST "http://127.0.0.1:${INGRESS_PORT}/observation" \
            -H 'content-type: application/json' \
            -d '{"id":"obs-1","t":"2025-01-01T00:00:00.000Z","type":"add","payload":{"n":1}}'
      - name: Exercise agent via /chat (optional)
        if: matrix.agent_worker == 'true'
        run: |
          CHAT_ID=$(curl -s -X POST "http://127.0.0.1:${AGENT_PORT}/chat" \
            -H 'content-type: application/json' -d '{"prompt":"hello (ci)"}' | jq -r .id)
          echo "CHAT_ID=${CHAT_ID}"
          for i in `seq 1 45`; do
            HAS=$(curl -s "http://127.0.0.1:${INGRESS_PORT}/snapshot" \
              | jq -r '([.data.observations, .timeline] | map(select(.!=null)) | .[0] // []) 
                       | any(.type=="LLM_CALL.response" and .payload.requestId=="'"$CHAT_ID"'")')
            [ "$HAS" = "true" ] && echo "response observed" && break || sleep 1
          done

      # スナップショット→リプレイ→一致
      - name: Snapshot/Replay match
        run: |
          curl -s "http://127.0.0.1:${INGRESS_PORT}/snapshot" > /tmp/snapA.json
          jq -S '([.data.observations, .timeline] | map(select(.!=null)) | .[0] // [])' /tmp/snapA.json > /tmp/a.json
          jq '{timeline: .}' /tmp/a.json > /tmp/timeline.json
          curl -s -X POST "http://127.0.0.1:${INGRESS_PORT}/replay" \
            -H 'content-type: application/json' -d @/tmp/timeline.json
          curl -s "http://127.0.0.1:${INGRESS_PORT}/snapshot" > /tmp/snapB.json
          jq -S '([.data.observations, .timeline] | map(select(.!=null)) | .[0] // [])' /tmp/snapB.json > /tmp/b.json
          diff -u /tmp/a.json /tmp/b.json
          echo "✅ Match | OS=${{ matrix.os }} | SSOT=${SSOT_DRIVER} | agent=${{ matrix.agent_worker }} | clock=seed:${RNG_SEED}"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "::group::api.log"; (cat logs/api.log || true); echo "::endgroup::"
          echo "::group::hana.log"; (cat logs/hana.log || true); echo "::endgroup::"
          echo "::group::emmy.log"; (cat logs/emmy.log || true); echo "::endgroup::"

      - name: Teardown (Linux/macOS)
        if: always() && runner.os != 'Windows'
        run: |
          if [ -f logs/emmy.pid ]; then while read p; do kill -9 "$p" || true; done < logs/emmy.pid; fi
          if [ -f logs/hana.pid ]; then kill -9 $(cat logs/hana.pid) || true; fi
          if [ -f logs/api.pid ]; then kill -9 $(cat logs/api.pid) || true; fi
      - name: Teardown (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path 'logs\emmy.pid') { Get-Content 'logs\emmy.pid' | ForEach-Object { Stop-Process -Id $_ -Force -ErrorAction SilentlyContinue } }
          if (Test-Path 'logs\hana.pid') { $pid = Get-Content 'logs\hana.pid'; if ($pid) { Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue } }
          if (Test-Path 'logs\api.pid')  { $pid = Get-Content 'logs\api.pid';  if ($pid) { Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue } }
