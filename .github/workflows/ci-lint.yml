name: CI (lint / fmt / check / test)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with: { deno-version: v2.x }
      - run: deno fmt --check
      - run: deno lint
      - run: deno check bin/cli.ts
      - run: deno test -A
